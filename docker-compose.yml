services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: learncrm
      POSTGRES_PASSWORD: learncrm_secret
      POSTGRES_DB: learncrm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learncrm -d learncrm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://learncrm:learncrm_secret@db:5432/learncrm_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-strong-random-key}
      API_KEY: ${API_KEY:-change-me-in-production}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
